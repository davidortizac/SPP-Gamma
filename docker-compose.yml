version: '3.9'
services:
  gamma-portfolio-explorer:
    build: .
    container_name: gamma-portfolio-explorer
    ports:
      - "3080:3000"
    environment:
      PORT: 3000
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./catalog.json:/app/catalog.json
    restart: unless-stopped
