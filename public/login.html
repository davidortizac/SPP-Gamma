<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | Gamma Portfolio Explorer</title>
  <link rel="icon" type="image/png" href="/imagenes/GammaGris.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gamma-black:   #1a1a1a;
      --gamma-charcoal:#2d2d2d;
      --gamma-red:     #c8102e;
      --gamma-red-dark:#9d0b22;
      --gamma-gray:    #6b7280;
      --gamma-light:   #f5f5f5;
      --gamma-border:  #e0e0e0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: var(--gamma-black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Fondo con grid sutil */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,16,46,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,16,46,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Glow decorativo */
    body::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(200,16,46,0.12) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 10;
      background: #ffffff;
      border-radius: 2px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Franja roja superior */
    .card-top-bar {
      height: 5px;
      background: linear-gradient(90deg, var(--gamma-red), var(--gamma-red-dark));
    }

    .card-header {
      background: var(--gamma-black);
      padding: 36px 40px 28px;
      text-align: center;
      position: relative;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,16,46,0.4), transparent);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .logo-img {
      height: 36px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .app-badge {
      display: inline-block;
      background: rgba(200,16,46,0.15);
      color: var(--gamma-red);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 2px;
      border: 1px solid rgba(200,16,46,0.3);
      margin-bottom: 8px;
    }

    .card-title {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .card-body {
      padding: 32px 40px 36px;
      background: #fff;
    }

    /* Error alert */
    .alert-error {
      background: #fff5f5;
      border-left: 3px solid var(--gamma-red);
      color: #9d0b22;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 2px;
      margin-bottom: 20px;
      display: none;
    }
    .alert-error.show { display: block; }

    /* Google button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 13px 20px;
      background: var(--gamma-black);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-google:hover  { background: var(--gamma-charcoal); transform: translateY(-1px); }
    .btn-google:active { transform: translateY(0); }

    .btn-google svg { flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: var(--gamma-border);
    }
    .divider span {
      font-size: 11px;
      color: var(--gamma-gray);
      font-weight: 500;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Local form */
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--gamma-black);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--gamma-black);
      background: var(--gamma-light);
      border: 1.5px solid var(--gamma-border);
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-input:focus {
      border-color: var(--gamma-red);
      background: #fff;
    }
    .form-input::placeholder { color: #9ca3af; }

    .form-group { margin-bottom: 16px; }

    .btn-submit {
      width: 100%;
      padding: 13px 20px;
      background: var(--gamma-red);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-submit:hover  { background: var(--gamma-red-dark); transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    .card-footer {
      padding: 16px 40px 24px;
      text-align: center;
      border-top: 1px solid var(--gamma-border);
    }
    .card-footer p {
      font-size: 11px;
      color: var(--gamma-gray);
      line-height: 1.6;
    }
    .card-footer a {
      color: var(--gamma-red);
      text-decoration: none;
      font-weight: 600;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* Gamma corner mark */
    .corner-mark {
      position: absolute;
      bottom: 28px;
      right: 32px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Version badge */
    .version-tag {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 9px;
      font-weight: 700;
      color: rgba(200,16,46,0.6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(200,16,46,0.2);
      padding: 2px 7px;
      border-radius: 2px;
    }

    @media (max-width: 480px) {
      .login-card { max-width: 100%; margin: 16px; border-radius: 2px; }
      .card-header, .card-body, .card-footer { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>

  <div class="corner-mark">Gamma Ingenieros © 2025</div>
  <div class="version-tag">v1.1</div>

  <div class="login-card">
    <div class="card-top-bar"></div>

    <div class="card-header">
      <div class="logo-wrap">
        <img src="/imagenes/Logo-Gamma-Ingenieros-(Negro).png"
             alt="Gamma Ingenieros"
             class="logo-img"
             onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'">
        <span id="logo-text" style="display:none; color:#fff; font-size:22px; font-weight:900; letter-spacing:-0.03em;">GAMMA</span>
      </div>
      <div class="app-badge">Sales Pitch Pro</div>
      <h1 class="card-title">Acceso a la plataforma</h1>
    </div>

    <div class="card-body">

      <!-- Error alert -->
      <div class="alert-error" id="errorAlert"></div>

      <!-- Google OAuth -->
      <a href="/auth/google" class="btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </a>

      <div class="divider"><span>o ingresa con cuenta local</span></div>

      <!-- Local login form -->
      <form action="/auth/local" method="POST" id="localForm">
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" class="form-input"
                 placeholder="usuario@gammaingenieros.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" name="password" class="form-input"
                 placeholder="••••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit">Iniciar sesión</button>
      </form>

    </div>

    <div class="card-footer">
      <p>Acceso restringido a usuarios autorizados de Gamma Ingenieros.</p>
      <p style="margin-top:6px;">¿Problemas de acceso? <a href="mailto:it@gammaingenieros.com">Contacta a IT</a></p>
    </div>
  </div>

  <script>
    // Mostrar error desde query param
    const params = new URLSearchParams(window.location.search);
    const errorEl = document.getElementById('errorAlert');
    const googleBtn = document.getElementById('googleBtn');

    const errorMessages = {
      dominio: 'Solo usuarios del dominio corporativo de Gamma Ingenieros pueden acceder.',
      credenciales: 'Correo o contraseña incorrectos. Intenta de nuevo.',
    };

    const e = params.get('error');
    if (e && errorMessages[e]) {
      errorEl.textContent = errorMessages[e];
      errorEl.classList.add('show');
    }

    // Ocultar botón Google si no está configurado en el server
    fetch('/api/config').then(r => r.json()).then(cfg => {
      if (!cfg.googleAuthEnabled) {
        googleBtn.style.display = 'none';
        document.querySelector('.divider').style.display = 'none';
      }
    }).catch(() => {});
  </script>
</body>
</html>
